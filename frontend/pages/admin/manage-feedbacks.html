<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Feedbacks verwalten</title>
    <link rel="stylesheet" href="../../css/styles.css" />
  </head>
  <body>
    <header>
      <h1>Feedback-Verwaltung</h1>
      <button id="dashboardButton">Zurück zum Admin-Dashboard</button>
    </header>

    <main>
      <h2>Alle Feedbacks (<span id="feedbackCount">0</span>)</h2>
      <table id="feedbackTable">
        <thead>
          <tr>
            <th>✔</th>
            <th>ID</th>
            <th>Benutzer</th>
            <th>Nachricht</th>
            <th>Datum</th>
          </tr>
        </thead>
        <tbody>
          <!-- Feedbacks werden hier per JS eingefügt -->
        </tbody>
      </table>
      <button id="deleteSelectedFeedbacks" style="margin: 30px">löschen</button>
    </main>

    <footer>
      <p>&copy; 2025 Kalikian</p>
    </footer>
    <script src="../../js/pages/admin/manage-feedbacks.js"></script>
    <script src="../../js/utils/utils.js"></script>
  </body>
</html>
