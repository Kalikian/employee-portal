<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Feedback Bereich</title>
    <link rel="stylesheet" href="../../css/styles.css" />
  </head>
  <body>
    <header>
      <h1>Feedback Bereich</h1>
      <button id="back">Zurück</button>
      <button onclick="window.location.href='manage-feedbacks.html'">
        Zu meine Feedbacks
      </button>
    </header>

    <main>
      <section id="feedback-form">
        <h2>Feedback schreiben</h2>
        <textarea
          id="feedbackMessage"
          placeholder="Schreibe dein Feedback..."
        ></textarea>
        <label>
          <input type="checkbox" id="isAnonymous" /> Anonym senden
        </label>
        <button id="submitFeedback">Senden</button>
      </section>
    </main>

    <footer>
      <p>&copy; 2025 Kalikian</p>
    </footer>
    <script src="../../js/utils/utils.js"></script>
    <script src="../../js/pages/user/feedback.js"></script>
  </body>
</html>
